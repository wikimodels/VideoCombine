    <line x1="50" y1="2" x2="50" y2="98" stroke="#fff" stroke-width="4" />

    <!-- ЗАСЕЧКИ -->
    <line x1="45" y1="15" x2="55" y2="15" stroke="#fff" stroke-width="3" />
