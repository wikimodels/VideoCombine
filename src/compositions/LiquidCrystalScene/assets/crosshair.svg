    <line x1="45" y1="35" x2="55" y2="35" stroke="#fff" stroke-width="3" />

    <line x1="45" y1="65" x2="55" y2="65" stroke="#fff" stroke-width="3" />
    <line x1="45" y1="75" x2="55" y2="75" stroke="#fff" stroke-width="3" />
    <line x1="45" y1="85" x2="55" y2="85" stroke="#fff" stroke-width="3" />

    <line x1="15" y1="45" x2="15" y2="55" stroke="#fff" stroke-width="3" />
    <line x1="25" y1="45" x2="25" y2="55" stroke="#fff" stroke-width="3" />
    <line x1="35" y1="45" x2="35" y2="55" stroke="#fff" stroke-width="3" />

    <line x1="65" y1="45" x2="65" y2="55" stroke="#fff" stroke-width="3" />
